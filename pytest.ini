[pytest]

# 通用配置
addopts = -ra -q --maxfail=5 --strict-markers --disable-warnings
          --alluredir=reports/allure --clean-alluredir
          --junitxml=reports/results.xml
          --tb=short

# 测试文件、类、函数匹配规则
testpaths = interface_test/
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_* check_*

# 自定义标记（可用于选择特定测试）
markers =
    smoke: 标记为冒烟测试
    regression: 标记为回归测试
    slow: 运行时间较长的测试
    performance: 性能测试

# 忽略特定的警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# 日志配置
log_cli = true
log_cli_level = INFO
log_file = reports/test.log
log_file_level = DEBUG

# 重试机制（安装 pytest-rerunfailures 插件后）
reruns = 3
reruns_delay = 5

# 配置 allure 报告插件（如果使用 Allure）
#allure_report_dir = reports/allure

# 配置 cov 代码覆盖率插件
[coverage:run]
branch = True
source = project

[coverage:report]
show_missing = True
skip_covered = True